<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINMAXMUSCLE | Optimize Hardware</title>
    <meta name="description" content="The definitive database for peptides, biological stacks, and recovery protocols.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        :root { --bg-body: #09090b; --accent: #3b82f6; }
        body { background-color: var(--bg-body); color: #f4f4f5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        h1, h2, h3, .display-font { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.03em; }

        .bento-card {
            background: linear-gradient(180deg, rgba(24, 24, 27, 0.6) 0%, rgba(24, 24, 27, 0.95) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .bento-card:hover { 
            border-color: rgba(255, 255, 255, 0.2); 
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3); 
            transform: translateY(-4px);
        }

        .nav-pill { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); }
        .view-section { display: none; opacity: 0; transform: translateY(20px); transition: opacity 0.4s ease, transform 0.4s ease; }
        .view-section.active { display: block; opacity: 1; transform: translateY(0); }
        .nav-link.active { color: white; background: rgba(255,255,255,0.1); }
        
        /* Modal Styles */
        #modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content {
            background: #09090b;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* FAQ Accordion */
        details > summary { list-style: none; }
        details > summary::-webkit-details-marker { display: none; }
        details[open] summary ~ * { animation: sweep .5s ease-in-out; }
        @keyframes sweep { 0%    {opacity: 0; transform: translateY(-10px)} 100%  {opacity: 1; transform: translateY(0)} }
        
        .skeleton { animation: pulse-bg 1.5s infinite; background: rgba(255,255,255,0.05); }
        @keyframes pulse-bg { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
    </style>
</head>
<body class="selection:bg-blue-500 selection:text-white min-h-screen flex flex-col">

    <!-- Navigation -->
    <nav class="fixed top-6 left-0 right-0 z-50 flex justify-center px-4">
        <div class="nav-pill rounded-full px-2 py-2 flex items-center justify-between gap-4 w-full max-w-3xl shadow-2xl">
            <button onclick="navigate('/')" class="flex items-center gap-3 pl-4 pr-2 group">
                <div class="w-8 h-8 bg-white text-black rounded-full flex items-center justify-center font-bold display-font group-hover:bg-blue-500 group-hover:text-white transition">M</div>
                <span class="font-bold tracking-tight hidden sm:block group-hover:text-white transition text-gray-200">MINMAX</span>
            </button>
            <div class="hidden md:flex gap-1 bg-black/20 rounded-full p-1 border border-white/5">
                <button onclick="navigate('/peptides')" class="nav-link px-4 py-1.5 rounded-full text-sm font-medium text-gray-400 hover:text-white hover:bg-white/10 transition" id="nav-peptides">Peptides</button>
                <button onclick="navigate('/calculators')" class="nav-link px-4 py-1.5 rounded-full text-sm font-medium text-gray-400 hover:text-white hover:bg-white/10 transition" id="nav-calculators">Tools</button>
            </div>
            <button onclick="navigate('/peptides')" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold px-5 py-2.5 rounded-full transition shadow-[0_0_20px_-5px_rgba(59,130,246,0.5)]">
                Database
            </button>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="flex-grow relative w-full pt-24 pb-20">

        <!-- HOME -->
        <section id="view-home" class="view-section active">
            <div class="relative min-h-[85vh] flex items-center justify-center overflow-hidden">
                <div class="absolute inset-0 z-0">
                    <img src="https://images.unsplash.com/photo-1534438327276-14e5300c3a48?q=80&w=2070&auto=format&fit=crop" class="w-full h-full object-cover opacity-50" alt="Gym">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#09090b] via-[#09090b]/60 to-transparent"></div>
                </div>
                <div class="relative z-10 text-center px-4 max-w-4xl mx-auto">
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-white/10 bg-white/5 text-gray-300 text-xs mb-8">
                        <span class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></span>
                        <span id="system-status">System Online</span>
                    </div>
                    <h1 class="text-6xl md:text-8xl font-bold mb-6 tracking-tighter leading-[0.9]">
                        OPTIMIZE YOUR<br><span class="text-blue-500">HARDWARE</span>
                    </h1>
                    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                        <button onclick="navigate('/peptides')" class="w-full sm:w-auto px-8 py-4 bg-white text-black font-bold rounded-xl hover:bg-gray-200 transition display-font">
                            Browse Peptides
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <!-- PEPTIDES GRID -->
        <section id="view-peptides" class="view-section px-4 max-w-7xl mx-auto">
            <div class="flex flex-col md:flex-row md:items-end justify-between mb-12 gap-6 mt-10">
                <div>
                    <h2 class="text-4xl font-bold text-white mb-2">Active Peptides</h2>
                    <p class="text-gray-400">Select a card to view dosing & research.</p>
                </div>
                <div class="relative w-full md:w-96">
                    <input type="text" id="peptideSearch" class="w-full bg-[#18181b] border border-white/10 text-white px-4 py-3 rounded-lg focus:border-blue-500 outline-none" placeholder="Search Database...">
                </div>
            </div>
            
            <div id="grid-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Loading State -->
                <div class="bento-card h-64 rounded-xl skeleton"></div>
                <div class="bento-card h-64 rounded-xl skeleton"></div>
                <div class="bento-card h-64 rounded-xl skeleton"></div>
            </div>
        </section>

        <!-- CALCULATORS -->
        <section id="view-calculators" class="view-section px-4 max-w-5xl mx-auto mt-10">
            <h2 class="text-4xl font-bold text-white mb-8 text-center">Lab Tools</h2>
            <div class="bento-card p-8 rounded-3xl relative overflow-hidden max-w-2xl mx-auto">
                <h3 class="text-2xl font-bold text-white mb-2">Peptide Reconstitution</h3>
                <div class="space-y-4 mt-6">
                    <div><label class="text-xs text-gray-500 uppercase font-bold ml-1">Vial Quantity (mg)</label><input type="number" id="calc-mg" class="w-full bg-black/30 border border-white/10 text-white p-3 rounded-lg mt-1" value="5"></div>
                    <div><label class="text-xs text-gray-500 uppercase font-bold ml-1">Water Added (ml)</label><input type="number" id="calc-ml" class="w-full bg-black/30 border border-white/10 text-white p-3 rounded-lg mt-1" value="2"></div>
                    <div><label class="text-xs text-gray-500 uppercase font-bold ml-1">Desired Dose (mcg)</label><input type="number" id="calc-mcg" class="w-full bg-black/30 border border-white/10 text-white p-3 rounded-lg mt-1" value="250"></div>
                    <div class="p-4 bg-blue-900/20 border border-blue-500/30 rounded-lg mt-4 text-center">
                        <span class="text-xs text-blue-400 uppercase tracking-widest block mb-1">Insulin Syringe Draw</span>
                        <span class="text-3xl font-bold text-white display-font" id="calc-result">10 Units</span>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div id="modal-content" class="modal-content w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-2xl opacity-0 transform scale-95 transition-all duration-300">
            <!-- Content Injected via JS -->
        </div>
    </div>

    <script>
        // --- ROUTER ---
        const ROUTES = {
            '/': { id: 'view-home', title: 'Home | MinMaxMuscle' },
            '/peptides': { id: 'view-peptides', title: 'Peptides | MinMaxMuscle' },
            '/calculators': { id: 'view-calculators', title: 'Calculators | MinMaxMuscle' }
        };

        function navigate(path, addToHistory = true) {
            if (path.startsWith('/peptide/')) {
                const slug = path.split('/')[2];
                if (GLOBAL_DATA.length === 0) {
                    fetchData().then(() => openDeepLink(slug));
                } else {
                    openDeepLink(slug);
                }
                if (addToHistory) window.history.pushState({}, '', path);
                return;
            }

            if (path.length > 1 && path.endsWith('/')) path = path.slice(0, -1);
            if (!ROUTES[path]) path = '/';
            
            const route = ROUTES[path];
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById(route.id).classList.add('active');
            
            closeModal(false);

            document.title = route.title;
            if (addToHistory) window.history.pushState({}, '', path);
            window.scrollTo(0,0);
        }

        function openDeepLink(slug) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.getElementById('view-peptides').classList.add('active');
            
            const item = GLOBAL_DATA.find(p => p.slug === slug);
            if (item) {
                openModal(item, false); 
                document.title = `${item.name} | MinMaxMuscle`;
            } else {
                navigate('/peptides');
            }
        }

        window.addEventListener('popstate', () => navigate(window.location.pathname, false));
        window.addEventListener('DOMContentLoaded', () => {
            fetchData().then(() => {
                 navigate(window.location.pathname, false);
            });
        });

        // --- DATA & RENDER ---
        let GLOBAL_DATA = [];

        async function fetchData() {
            if (GLOBAL_DATA.length > 0) return;
            try {
                const response = await fetch('/api/peptides');
                if (!response.ok) throw new Error('API Error');
                GLOBAL_DATA = await response.json();
                renderPeptides(GLOBAL_DATA);
            } catch (error) {
                console.error("DB Error:", error);
                GLOBAL_DATA = [{name: "DB Connection Error", slug: "error"}];
                renderPeptides(GLOBAL_DATA);
            }
        }

        function renderPeptides(data) {
            const grid = document.getElementById('grid-container');
            grid.innerHTML = '';
            
            data.forEach(p => {
                let color = 'text-gray-400';
                if(p.cat && p.cat.includes('Repair')) color = 'text-blue-400';
                if(p.cat && p.cat.includes('Cosmetic')) color = 'text-purple-400';
                
                let imgUrl = 'https://images.unsplash.com/photo-1584308666744-24d5c474f2ae?q=80&w=2030';
                if(p.cat && p.cat.includes('Cosmetic')) imgUrl = 'https://images.unsplash.com/photo-1616391182219-e080b4d1043a?q=80&w=1983';
                if(p.cat && p.cat.includes('Muscle')) imgUrl = 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?q=80&w=2070';

                const card = document.createElement('a');
                card.href = `/peptide/${p.slug}`;
                card.className = 'bento-card rounded-2xl p-1 overflow-hidden group cursor-pointer block h-full';
                
                card.onclick = (e) => {
                    e.preventDefault();
                    navigate(`/peptide/${p.slug}`);
                };
                
                card.innerHTML = `
                    <div class="relative bg-[#18181b] rounded-xl h-full flex flex-col overflow-hidden">
                        <div class="h-40 relative overflow-hidden">
                            <img src="${imgUrl}" class="w-full h-full object-cover opacity-60 group-hover:scale-110 transition duration-700">
                            <div class="absolute inset-0 bg-gradient-to-t from-[#18181b] to-transparent"></div>
                            <div class="absolute top-3 right-3"><span class="text-[10px] font-bold uppercase px-2 py-1 rounded bg-black/50 backdrop-blur border border-white/10 ${color}">${p.cat || 'General'}</span></div>
                        </div>
                        <div class="p-6">
                            <div class="flex justify-between items-center mb-2">
                                <h3 class="text-2xl font-bold text-white display-font group-hover:text-blue-400 transition">${p.name}</h3>
                                <span class="text-xs font-mono text-gray-500">Rank: ${p.rank || '-'}/10</span>
                            </div>
                            <p class="text-sm text-gray-400 leading-relaxed line-clamp-3">${p.focus || p.summary || 'Click for details.'}</p>
                        </div>
                    </div>`;
                grid.appendChild(card);
            });
            feather.replace();
        }

        // --- MODAL LOGIC (With FAQs) ---
        function openModal(item, updateHistory = true) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            
            // Generate FAQs
            let faqHTML = '';
            if (item.faq_questions && item.faq_answers) {
                const qs = item.faq_questions.split('|||');
                const as = item.faq_answers.split('|||');
                
                if (qs.length > 0) {
                    faqHTML += `<div class="mt-8 pt-8 border-t border-white/5">
                        <h4 class="text-sm font-bold text-gray-500 uppercase mb-4">Common Questions</h4>
                        <div class="space-y-2">`;
                    
                    qs.forEach((q, i) => {
                        const a = as[i] || "Information pending.";
                        if(q) {
                            faqHTML += `
                            <details class="bg-white/5 rounded-lg open:bg-white/10 transition group">
                                <summary class="p-4 cursor-pointer font-bold text-white text-sm flex justify-between items-center select-none">
                                    ${q}
                                    <i data-feather="chevron-down" class="text-gray-500 w-4 h-4 transition group-open:rotate-180"></i>
                                </summary>
                                <div class="px-4 pb-4 text-sm text-gray-300 leading-relaxed border-t border-white/5 pt-2">
                                    ${a}
                                </div>
                            </details>`;
                        }
                    });
                    faqHTML += `</div></div>`;
                }
            }

            // Generate content
            content.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-12 min-h-[500px]">
                    <div class="md:col-span-4 bg-[#020617] p-8 border-r border-white/5 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-blue-500 to-purple-500"></div>
                        <h2 class="text-5xl font-bold text-white display-font mb-2">${item.name}</h2>
                        <span class="text-blue-400 text-sm font-bold uppercase tracking-widest block mb-8">${item.cat}</span>
                        <div class="space-y-6 text-sm">
                            <div class="bg-white/5 p-4 rounded border border-white/5">
                                <span class="text-gray-500 uppercase text-[10px] font-bold block mb-1">Status</span>
                                <span class="text-white">${item.status || 'Research'}</span>
                            </div>
                             <div class="bg-white/5 p-4 rounded border border-white/5">
                                <span class="text-gray-500 uppercase text-[10px] font-bold block mb-1">Known As</span>
                                <span class="text-white">${item.nicknames || '-'}</span>
                            </div>
                        </div>
                    </div>
                    <div class="md:col-span-8 bg-[#09090b] p-8 relative">
                        <button onclick="navigate('/peptides')" class="absolute top-6 right-6 p-2 bg-white/5 hover:bg-white/10 rounded-full text-white transition"><i data-feather="x"></i></button>
                        
                        <div class="mb-8">
                            <h3 class="text-xl font-bold text-white mb-4 border-l-4 border-blue-500 pl-4">Mechanism of Action</h3>
                            <p class="text-gray-300 leading-relaxed text-lg">${item.summary || item.focus || 'No detailed summary available.'}</p>
                        </div>

                        ${faqHTML}

                        ${item.sources ? `
                        <div class="mt-8 pt-8 border-t border-white/5">
                             <a href="${item.sources.split(',')[0]}" target="_blank" class="text-xs text-gray-500 hover:text-white transition flex items-center gap-2">
                                <i data-feather="external-link" class="w-3 h-3"></i> View Clinical Source
                             </a>
                        </div>` : ''}
                    </div>
                </div>
            `;
            
            overlay.classList.remove('hidden');
            setTimeout(() => {
                content.classList.remove('opacity-0', 'scale-95');
                content.classList.add('opacity-100', 'scale-100');
            }, 10);
            feather.replace();
            
            if(updateHistory) window.history.pushState({}, '', `/peptide/${item.slug}`);
        }

        function closeModal(updateHistory = true) {
            const overlay = document.getElementById('modal-overlay');
            const content = document.getElementById('modal-content');
            content.classList.remove('opacity-100', 'scale-100');
            content.classList.add('opacity-0', 'scale-95');
            setTimeout(() => overlay.classList.add('hidden'), 300);
            if(updateHistory) window.history.pushState({}, '', '/peptides');
        }

        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target.id === 'modal-overlay') navigate('/peptides');
        });

        document.getElementById('peptideSearch').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = GLOBAL_DATA.filter(p => p.name.toLowerCase().includes(term) || (p.focus && p.focus.toLowerCase().includes(term)));
            renderPeptides(filtered);
        });

        const ids = ['calc-mg', 'calc-ml', 'calc-mcg'];
        ids.forEach(id => document.getElementById(id).addEventListener('input', calculateRecon));
        function calculateRecon() {
            const mg = parseFloat(document.getElementById('calc-mg').value) || 0;
            const ml = parseFloat(document.getElementById('calc-ml').value) || 0;
            const dose = parseFloat(document.getElementById('calc-mcg').value) || 0;
            if (mg > 0 && ml > 0 && dose > 0) {
                const units = dose / ((mg * 1000) / (ml * 100)); 
                document.getElementById('calc-result').innerText = units.toFixed(1) + " Units";
            }
        }
    </script>
</body>
</html>
